name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Check JSON syntax
        run: find schemas examples -name '*.json' -print0 | xargs -0 -n1 python -m json.tool >/dev/null

      - name: Validate example configs
        run: |
          PYTHONPATH=src python -m pangolin_eval.cli validate --config examples/simple_model_compare/config.json
          PYTHONPATH=src python -m pangolin_eval.cli validate --config examples/openai_compatible/config.json
          PYTHONPATH=src python -m pangolin_eval.cli validate --config examples/litellm_gateway/config.json
          PYTHONPATH=src python -m pangolin_eval.cli validate --config examples/ollama_openai_compatible/config.json
          PYTHONPATH=src python -m pangolin_eval.cli validate --config examples/vllm_openai_compatible/config.json

      - name: Run CLI smoke checks
        run: |
          PYTHONPATH=src python -m pangolin_eval.cli run --config examples/simple_model_compare/config.json --out reports/simple_model_compare --content-mode metadata-only --html
          PYTHONPATH=src python -m pangolin_eval.cli rag --config examples/rag_eval/config.json --out reports/rag_eval --content-mode metadata-only --html
          PYTHONPATH=src python -m pangolin_eval.cli trace --input examples/agent_trace/trace_events.json --out reports/agent_trace --html
          PYTHONPATH=src python -m pangolin_eval.cli export-otel --input reports/simple_model_compare/report.json --out reports/simple_model_compare/otel.json

      - name: Build and install package
        run: |
          python -m pip install --upgrade build
          python -m build
          python -m pip install --force-reinstall dist/*.whl
          pangolin-eval --help
